name: attendance_app
description: Attendly — учёт посещаемости учеников
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  share_plus: ^10.1.4
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  ios: true
  adaptive_icon_background: "#121318"
  adaptive_icon_foreground: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#0E0F12"
    theme_color: "#7C9EFF"
  windows:
    generate: true
    image_path: assets/images/app_icon.png
    icon_size: 256
